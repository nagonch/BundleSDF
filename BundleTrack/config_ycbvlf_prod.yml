data_dir: /home/ngoncharov/cvpr2026/ycbv-eoat-lf/prod_dataset_new
model_name: textured_simple
model_dir: ""
debug_dir: /home/ngoncharov/cvpr2026/BundleSDF/debug/BundleTrack/
init_pose_dir: ""
SPDLOG: 2
port: '5555'
seg_port: '1111'
nerf_port: "9999"
erode_mask: 3
USE_GRAY: true

segmentation:
  ob_scales: [0.3,0.3,0.3]
  tolerance: 0.03

depth_processing:
  zfar: 2.0
  erode:
    radius: 1
    diff: 0.001
    ratio: 0.8
  bilateral_filter:
    radius: 2
    sigma_D: 2
    sigma_R: 100000
  outlier_removal:
    num: 30
    std_mul: 3
  edge_normal_thres: 10
  denoise_cloud: False
  percentile: 95

visible_angle: 70

bundle:
  num_iter_outter: 7
  num_iter_inner: 5
  window_size: 5
  max_BA_frames: 10
  subset_selection_method: normal_orientation_nearest
  depth_association_radius: 5
  non_neighbor_max_rot: 90
  non_neighbor_min_visible: 0.1
  icp_pose_rot_thres: 60
  w_rpi: 0
  w_p2p: 1
  w_fm: 1
  w_sdf: 0
  w_pm: 0
  robust_delta: 0.005
  # lowered to survive fast-motion sequences with sparse features
  min_fm_edges_newframe: 3
  image_downscale: [4]
  feature_edge_dist_thres: 0.02
  feature_edge_normal_thres: 60
  max_optimized_feature_loss: 0.1

keyframe:
  min_interval: 1
  min_feat_num: 0
  min_trans: 0
  min_rot: 5
  min_visible: 1

sift:
  scales: [2,4,8]
  max_match_per_query: 5
  nOctaveLayers: 3
  contrastThreshold: 0.01
  edgeThreshold: 50
  sigma: 1.6

feature_corres:
  mutual: True
  map_points: True
  # generous neighbor thresholds — we tolerate noisy matches for this baseline
  max_dist_neighbor: 0.1
  max_normal_neighbor: 60
  # unconstrained for non-neighbors so large inter-frame motion still matches
  max_dist_no_neighbor: 999
  max_normal_no_neighbor: 180
  suppression_patch_size: 5
  max_view_normal_angle: 180
  # minimum raw matches before giving up on a frame; keep very low
  min_match_with_ref: 3
  resize: 400
  rematch_after_nerf: True

ransac:
  max_iter: 5000
  num_sample: 3
  # loose inlier thresholds — reflective / fast-moving objects produce noisy 3D
  inlier_dist: 0.05
  inlier_normal_angle: 60
  desired_succ_rate: 0.99
  # wide motion limits so fast sequences are not rejected
  max_trans_neighbor: 0.5
  max_rot_deg_neighbor: 90
  max_trans_no_neighbor: 999
  max_rot_no_neighbor: 180
  epipolar_thres: 3
  min_match_after_ransac: 3

p2p:
  projective: false
  max_dist: 0.05
  max_normal_angle: 60

sdf_edge:
  max_dist: 0.05

shape:
  res: 0.005
  xrange: [-0.2,0.2]
  yrange: [-0.2,0.2]
  zrange: [-0.2,0.2]
  max_weight: 100
  truncate_dist: 0.005

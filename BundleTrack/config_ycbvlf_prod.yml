data_dir: /home/ngoncharov/cvpr2026/ycbv-eoat-lf/prod_dataset_new
model_name: textured_simple
model_dir: ""
debug_dir: /home/ngoncharov/cvpr2026/BundleSDF/debug/BundleTrack/
init_pose_dir: ""
SPDLOG: 2
port: '5555'
seg_port: '1111'
nerf_port: "9999"
erode_mask: 3
USE_GRAY: true

segmentation:
  ob_scales: [0.3,0.3,0.3]
  tolerance: 0.03

depth_processing:
  # robot-arm tabletop workspace; objects are 0.5–1.5 m from camera
  zfar: 2.0
  erode:
    radius: 1
    diff: 0.001
    ratio: 0.8
  bilateral_filter:
    radius: 2
    sigma_D: 2
    sigma_R: 100000
  outlier_removal:
    num: 30
    std_mul: 3
  edge_normal_thres: 10
  denoise_cloud: False
  # clip noisy far-range depth while keeping most of the signal
  percentile: 95

visible_angle: 70

bundle:
  num_iter_outter: 7
  num_iter_inner: 5
  window_size: 5
  max_BA_frames: 10
  subset_selection_method: normal_orientation_nearest
  depth_association_radius: 5
  non_neighbor_max_rot: 90
  non_neighbor_min_visible: 0.1
  icp_pose_rot_thres: 60
  w_rpi: 0
  w_p2p: 1
  w_fm: 1
  w_sdf: 0
  w_pm: 0
  robust_delta: 0.005
  min_fm_edges_newframe: 15
  image_downscale: [4]
  feature_edge_dist_thres: 0.01
  feature_edge_normal_thres: 30
  max_optimized_feature_loss: 0.03

keyframe:
  min_interval: 1
  min_feat_num: 0
  min_trans: 0
  min_rot: 5
  min_visible: 1

sift:
  scales: [2,4,8]
  max_match_per_query: 5
  nOctaveLayers: 3
  contrastThreshold: 0.01
  edgeThreshold: 50
  sigma: 1.6

feature_corres:
  mutual: True
  # map_points lets BundleTrack reuse tracked 3D points across keyframes
  map_points: True
  # tight neighbor thresholds to reject spurious matches between close frames
  max_dist_neighbor: 0.02
  max_normal_neighbor: 30
  # strict no-neighbor thresholds; large rotations handled by ransac limits
  max_dist_no_neighbor: 0.01
  max_normal_no_neighbor: 20
  suppression_patch_size: 5
  max_view_normal_angle: 180
  min_match_with_ref: 5
  resize: 400
  rematch_after_nerf: True

ransac:
  max_iter: 2000
  num_sample: 3
  # tighter inlier thresholds for small YCB-scale objects (~0.1–0.3 m)
  inlier_dist: 0.01
  inlier_normal_angle: 20
  desired_succ_rate: 0.99
  max_trans_neighbor: 0.02
  max_rot_deg_neighbor: 30
  max_trans_no_neighbor: 0.01
  max_rot_no_neighbor: 10
  epipolar_thres: 1
  min_match_after_ransac: 5

p2p:
  projective: false
  max_dist: 0.02
  max_normal_angle: 45

sdf_edge:
  max_dist: 0.02

shape:
  # 5 mm voxel resolution; YCB objects fit within ±0.2 m
  res: 0.005
  xrange: [-0.2,0.2]
  yrange: [-0.2,0.2]
  zrange: [-0.2,0.2]
  max_weight: 100
  truncate_dist: 0.005
